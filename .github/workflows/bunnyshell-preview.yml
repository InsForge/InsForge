name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: bunnyshell-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  BNS_TOKEN: ${{ secrets.BUNNYSHELL_TOKEN }}
  BNS_ORG: "4818"
  BNS_PROJECT: "6134"
  ENV_NAME: "pr-${{ github.event.pull_request.number }}"

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Install Bunnyshell CLI
        run: |
          curl -sL -o /tmp/bns.tar.gz \
            "https://github.com/bunnyshell/cli/releases/download/v0.26.0/bns_0.26.0_Linux_x86_64.tar.gz"
          tar -xzf /tmp/bns.tar.gz -C /usr/local/bin/
          chmod +x /usr/local/bin/bns

      - name: Check for existing environment
        id: check-env
        run: |
          ENV_ID=$(bns env list \
            --token "$BNS_TOKEN" \
            --project "$BNS_PROJECT" \
            --search "$ENV_NAME" \
            --non-interactive \
            -o json 2>/dev/null | jq -r '.data[0].id // empty')
          echo "env_id=$ENV_ID" >> "$GITHUB_OUTPUT"

      - name: Create environment
        if: steps.check-env.outputs.env_id == ''
        id: create-env
        run: |
          ENV_ID=$(bns env create \
            --token "$BNS_TOKEN" \
            --project "$BNS_PROJECT" \
            --name "$ENV_NAME" \
            --from-path ".bunnyshell/bunnyshell.yaml" \
            --from-git-repo "https://github.com/${{ github.repository }}" \
            --from-git-branch "${{ github.head_ref }}" \
            --deploy \
            --non-interactive \
            -o json | jq -r '.data.id')
          echo "env_id=$ENV_ID" >> "$GITHUB_OUTPUT"

      - name: Update environment on push
        if: steps.check-env.outputs.env_id != ''
        run: |
          bns env update-configuration \
            --token "$BNS_TOKEN" \
            --id "${{ steps.check-env.outputs.env_id }}" \
            --from-path ".bunnyshell/bunnyshell.yaml" \
            --from-git-repo "https://github.com/${{ github.repository }}" \
            --from-git-branch "${{ github.head_ref }}" \
            --non-interactive
          bns env deploy \
            --token "$BNS_TOKEN" \
            --id "${{ steps.check-env.outputs.env_id }}" \
            --non-interactive

      - name: Get environment URL
        id: get-url
        run: |
          FINAL_ENV_ID="${{ steps.create-env.outputs.env_id || steps.check-env.outputs.env_id }}"
          for i in $(seq 1 60); do
            URL=$(bns env endpoints \
              --token "$BNS_TOKEN" \
              --id "$FINAL_ENV_ID" \
              --non-interactive \
              -o json 2>/dev/null | jq -r '.data[0].url // empty')
            if [ -n "$URL" ]; then
              echo "url=$URL" >> "$GITHUB_OUTPUT"
              echo "env_id=$FINAL_ENV_ID" >> "$GITHUB_OUTPUT"
              break
            fi
            sleep 10
          done

      - name: Comment PR with preview URL
        if: steps.get-url.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- bunnyshell-preview -->';
            const body = `${marker}
            ### Preview Environment

            | | |
            |---|---|
            | **URL** | ${{ steps.get-url.outputs.url }} |
            | **Environment** | [View in Bunnyshell](https://environments.bunnyshell.com/${{ env.BNS_ORG }}/projects/${{ env.BNS_PROJECT }}/environments/${{ steps.get-url.outputs.env_id }}) |
            | **Branch** | \`${{ github.head_ref }}\` |
            | **Commit** | \`${{ github.event.pull_request.head.sha }}\` |

            *Updated on every push. Destroyed when PR is closed.*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  destroy-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Install Bunnyshell CLI
        run: |
          curl -sL -o /tmp/bns.tar.gz \
            "https://github.com/bunnyshell/cli/releases/download/v0.26.0/bns_0.26.0_Linux_x86_64.tar.gz"
          tar -xzf /tmp/bns.tar.gz -C /usr/local/bin/
          chmod +x /usr/local/bin/bns

      - name: Find and destroy environment
        run: |
          ENV_ID=$(bns env list \
            --token "$BNS_TOKEN" \
            --project "$BNS_PROJECT" \
            --search "$ENV_NAME" \
            --non-interactive \
            -o json 2>/dev/null | jq -r '.data[0].id // empty')

          if [ -n "$ENV_ID" ]; then
            echo "Destroying environment $ENV_ID"
            bns env delete \
              --token "$BNS_TOKEN" \
              --id "$ENV_ID" \
              --non-interactive
          else
            echo "No environment found for $ENV_NAME"
          fi
